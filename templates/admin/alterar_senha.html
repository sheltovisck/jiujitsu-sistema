{% extends "base.html" %}
{% block title %}Admin - Alterar Senha{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-0"><i class="bi bi-key-fill me-2 text-danger"></i>Alterar Senha do Admin</h2>
        <p class="text-muted mb-0">Atualize a senha da conta administradora</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Senha atual</label>
                        <input type="password" name="senha_atual" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nova senha</label>
                        <input type="password" name="nova_senha" class="form-control" minlength="6" required>
                        <div class="form-text">Minimo de 6 caracteres.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirmar nova senha</label>
                        <input type="password" name="nova_senha2" class="form-control" minlength="6" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger fw-bold">
                            <i class="bi bi-key me-2"></i>Alterar Senha
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
